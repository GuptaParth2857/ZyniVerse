<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>ZyniVerse</h1>
      <span class="subtitle">Filler & Dub Guide</span>
    </header>
    <div id="content">
      <div id="search-section">
        <input type="text" id="search-input" placeholder="Search anime..." />
        <button id="search-btn">Search</button>
      </div>
      <div id="results" class="hidden"></div>
      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Searching...</p>
      </div>
      <div id="error" class="hidden">
        <p class="error-text"></p>
      </div>
      <div id="quick-links">
        <h3>Quick Links</h3>
        <a href="https://zyniverse.app/filler" target="_blank">Filler Guides</a>
        <a href="https://zyniverse.app/schedule" target="_blank">Airing Schedule</a>
        <a href="https://zyniverse.app/dubbed" target="_blank">Indian Dubs</a>
        <a href="https://zyniverse.app/recommendations" target="_blank">Recommendations</a>
      </div>
    </div>
    <footer>
      <a href="https://zyniverse.app" target="_blank">Open ZyniVerse</a>
      <span class="version">v1.0.0</span>
    </footer>
  </div>
</body>
</html>
